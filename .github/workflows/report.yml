name: market-report

on:
  schedule:
    # GitHub 예약 실행은 자주 수십 분~수 시간 지연되거나 누락된다(무료/베스트-에포트).
    # 그래서 미국장 마감(여름 20:00 UTC) 이후 ~1시간 간격으로 4개 앵커를 깔아 둔다.
    # 일부가 밀리거나 빠져도 그날 안에 최소 한 번은 돌게 하는 백업 구조.
    # 정시(:00)는 가장 혼잡하므로 분을 흩뜨린다. 월~금(UTC) = 한·미장 마감 모두 반영.
    # 20:43 UTC=익일 05:43 KST / 21:37=06:37 / 22:31=07:31 / 23:29=08:29.
    - cron: "43 20 * * 1-5"
    - cron: "37 21 * * 1-5"
    - cron: "31 22 * * 1-5"
    - cron: "29 23 * * 1-5"
  workflow_dispatch:        # 깃허브에서 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul          # '생성' 시각을 한국 시간으로 표시
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python market_report.py

      - name: commit & push
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          git commit -m "일일 시장 리포트 갱신" || echo "변경 없음"
          git push
