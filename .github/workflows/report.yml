name: market-report

on:
  schedule:
    # GitHub 예약 실행은 정시(:00)에 가장 혼잡해 지연·누락이 잦으므로 :17로 띄움.
    # 22:17 UTC = 익일 07:17 KST (1차), 23:17 UTC = 익일 08:17 KST (백업).
    # 월~금(UTC) 실행 = 한국 화~토 아침. 한·미장 마감이 모두 반영된 시점.
    - cron: "17 22 * * 1-5"
    - cron: "17 23 * * 1-5"
  workflow_dispatch:        # 깃허브에서 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul          # '생성' 시각을 한국 시간으로 표시
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python market_report.py

      - name: commit & push
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          git commit -m "일일 시장 리포트 갱신" || echo "변경 없음"
          git push
